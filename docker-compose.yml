services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: whattocook
      POSTGRES_PASSWORD: whattocook_dev
      POSTGRES_DB: whattocook
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U whattocook']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/whattocook --ignore-existing;
      mc anonymous set download local/whattocook/public;
      exit 0;
      "

  backend:
    build:
      context: .
      dockerfile: Dockerfiles/backend.Dockerfile
    ports:
      - '8080:8080'
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://whattocook:whattocook_dev@postgres:5432/whattocook
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      FLUX_WORKER_URL: http://flux-worker:8100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./backend/src:/app/src
    command: >
      sh -c "alembic upgrade head && uvicorn whattocook.main:app --host 0.0.0.0 --port 8080 --reload"

  worker:
    build:
      context: .
      dockerfile: Dockerfiles/worker.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://whattocook:whattocook_dev@postgres:5432/whattocook
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      FLUX_WORKER_URL: http://flux-worker:8100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./backend/src:/app/src
    command: python -m whattocook.worker

  frontend:
    build:
      context: .
      dockerfile: Dockerfiles/frontend.Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      VITE_API_URL: http://localhost:8080

  flux-worker:
    build:
      context: .
      dockerfile: Dockerfiles/flux.Dockerfile
    ports:
      - '8100:8100'
    volumes:
      - flux-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

volumes:
  pgdata:
  redisdata:
  miniodata:
  flux-cache:
